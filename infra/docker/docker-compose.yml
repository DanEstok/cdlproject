services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: recovery_platform
    ports:
      - "5432:5432"
    volumes:
      - recovery_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - recovery_redis:/data

volumes:
  recovery_pg:
  recovery_redis:
